services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: niyoplan-app
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    # Optional: If you want to use it for development with hot-reload, 
    # you would need a different Dockerfile or a complex volume strategy.
    # This setup is optimized for a robust production-like environment.
